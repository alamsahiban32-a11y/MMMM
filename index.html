<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>यूनिक मल्टी-टास्किंग डैशबोर्ड</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0b0f19;
            color: #e2e8f0;
            margin: 0;
            padding: 15px;
        }
        .header-panel {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid #334155;
        }
        .input-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            flex: 1;
            min-width: 250px;
            display: flex;
            flex-direction: column;
        }
        label {
            margin-bottom: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
        input {
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
            font-size: 15px;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            background: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            height: 46px;
        }
        button:hover {
            background: #0ea5e9;
        }
        /* ग्रिड लेआउट - जो स्क्रीन को बराबर भागों में बांटेगा */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(45%, 1fr));
            gap: 15px;
            width: 100%;
        }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
        .window-box {
            background: #1e293b;
            border: 2px solid #38bdf8;
            border-radius: 8px;
            height: 400px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .window-title {
            background: #334155;
            padding: 8px 12px;
            font-size: 13px;
            font-weight: bold;
            color: #38bdf8;
            display: flex;
            justify-content: space-between;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>

<div class="header-panel">
    <h3 style="margin-top:0; color:#38bdf8;">🖥️ एक स्क्रीन पर मल्टी-टास्किंग पैनल</h3>
    <div class="input-row">
        <div class="form-group" style="flex: 2;">
            <label>वेबसाइट का लिंक (URL) डालें:</label>
            <input type="url" id="targetUrl" value="https://bing.com" placeholder="https://example.com">
        </div>
        <div class="form-group" style="flex: 0.5; min-width: 100px;">
            <label>कितने पेज (Max 10):</label>
            <input type="number" id="windowCount" value="4" min="1" max="10">
        </div>
        <button onclick="loadMultitaskingGrid()">डैशबोर्ड चालू करें</button>
    </div>
</div>

<!-- यहीं पर सारी स्क्रीन्स अलग-अलग दिखाई देंगी -->
<div id="dashboardGrid" class="dashboard-grid"></div>

<script>
function loadMultitaskingGrid() {
    let url = document.getElementById('targetUrl').value.trim();
    let count = parseInt(document.getElementById('windowCount').value);
    let grid = document.getElementById('dashboardGrid');
    
    if(!url.match(/^https?:\/\//i)) { url = 'https://' + url; }
    if(!url || isNaN(count)) { alert("कृपया सही लिंक और संख्या डालें"); return; }

    grid.innerHTML = ""; // पुराना साफ़ करें

    for(let i = 1; i <= count; i++) {
        let uniqueUrl = url;
        // यूआरएल के पीछे यूनिक आईडी जोड़ना ताकि सेशन अलग होने की कोशिश हो
        if (uniqueUrl.includes('?')) {
            uniqueUrl += `&mysession=${i}`;
        } else {
            uniqueUrl += `?mysession=${i}`;
        }

        let box = document.createElement('div');
        box.className = 'window-box';
        
        box.innerHTML = `
            <div class="window-title">
                <span>टास्क विंडो #${i} (स्वतंत्र मोड)</span>
                <span style="color:#4ade80;">● Active</span>
            </div>
            <iframe src="${uniqueUrl}"></iframe>
        `;
        grid.appendChild(box);
    }
}
</script>

</body>
</html>
