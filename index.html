<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>सुपर फ़ास्ट क्रोम मल्टी-टैब ओपनर</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 550px;
            width: 100%;
            border: 1px solid #334155;
        }
        h2 {
            color: #38bdf8;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
        input[type="url"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #475569;
            border-radius: 6px;
            font-size: 16px;
            background-color: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .shortcuts {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: flex-start;
        }
        .shortcut-btn {
            background-color: #334155;
            color: #cbd5e1;
            border: 1px solid #475569;
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .shortcut-btn:hover {
            background-color: #475569;
            color: #fff;
        }
        button.main-btn {
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-top: 10px;
        }
        button.main-btn:hover {
            background-color: #0ea5e9;
        }
        .status-counter {
            margin-top: 20px;
            padding: 10px;
            background-color: #020617;
            border-radius: 6px;
            border: 1px solid #22c55e;
            color: #4ade80;
            font-weight: bold;
            display: none;
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 क्रोम सुपर मल्टी-टैब ओपनर</h2>
    
    <!-- लिंक इनपुट -->
    <div class="input-group">
        <label for="webUrl">वेबसाइट का लिंक (URL) यहाँ डालें:</label>
        <input type="url" id="webUrl" placeholder="https://example.com" value="https://www.google.com">
    </div>

    <!-- क्विक शॉर्टकट बटन्स (यहाँ आप अपने रोज़ के लिंक सेट कर सकते हैं) -->
    <div class="shortcuts">
        <span style="font-size: 12px; color: #94a3b8; align-self: center;">शॉर्टकट:</span>
        <button class="shortcut-btn" onclick="setLink('https://www.google.com')">Google</button>
        <button class="shortcut-btn" onclick="setLink('https://www.bing.com')">Bing</button>
    </div>

    <!-- टैब संख्या -->
    <div class="input-group">
        <label for="tabCount">कितने टैब्स एक साथ खोलने हैं? (Max 1000):</label>
        <input type="number" id="tabCount" min="1" max="1000" value="5">
    </div>
    
    <button class="main-btn" onclick="openChromeTabs()">रफ़्तार से टैब खोलें (Enter)</button>
    
    <!-- लाइव काउंटर (यह स्क्रीन पर दिखाएगा कि कितने टैब खुले) -->
    <div id="statusCounter" class="status-counter"></div>

    <div class="note">
        <strong>⚠️ सबसे ज़रूरी (Pop-up Blocker):</strong> जब आप पहली बार बटन दबाएंगे, तो क्रोम ऊपर एड्रेस बार में पॉप-अप ब्लॉक कर देगा। वहाँ लाल निशान पर क्लिक करके <strong>"Always allow pop-ups"</strong> (हमेशा अनुमति दें) को चुनें। उसके बाद यह 100% काम करेगा।
    </div>
</div>

<script>
// शॉर्टकट बटन के लिए फंक्शन
function setLink(url) {
    document.getElementById('webUrl').value = url;
}

function openChromeTabs() {
    let url = document.getElementById('webUrl').value.trim();
    let count = parseInt(document.getElementById('tabCount').value);
    let statusCounter = document.getElementById('statusCounter');

    if (!url.match(/^https?:\/\//i)) {
        url = 'https://' + url;
    }

    if (!url || url === 'https://') {
        alert("कृपया एक सही वेबसाइट लिंक डालें!");
        return;
    }
    if (isNaN(count) || count < 1 || count > 1000) {
        alert("कृपया 1 से 1000 के बीच की संख्या डालें!");
        return;
    }

    // स्क्रीन पर लाइव काउंटर दिखाना
    statusCounter.style.display = "block";
    statusCounter.innerText = `सफलतापूर्वक Chrome में ${count} टैब खोले जा रहे हैं...`;

    // क्रोम के असली न्यू टैब में लिंक खोलना (इसमें कोई वेबसाइट एरर नहीं देगी)
    for (let i = 0; i < count; i++) {
        window.open(url, `_blank_chrome_${i}_${Date.now()}`);
    }
}

// Enter कीबोर्ड बटन सपोर्ट
document.addEventListener('keydown', function(event) {
    if (event.key === 'Enter') {
        openChromeTabs();
    }
});
</script>

</body>
</html>
